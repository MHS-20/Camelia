services:
  seed:
    build: .
    environment:
      - TCP_ADDR=:4000
      - DHT_ADDR=:9000
      - HTTP_ADDR=:8080
    ports:
      - "4000:4000"
      - "9000:9000/udp"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/stats"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  node2:
    build: .
    depends_on:
      seed:
        condition: service_healthy
    environment:
      - TCP_ADDR=:4001
      - DHT_ADDR=:9001
      - HTTP_ADDR=:8081
      - TCP_BOOTSTRAP=seed:4000
      - DHT_BOOTSTRAP=seed:9000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/stats"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  node3:
    build: .
    depends_on:
      seed:
        condition: service_healthy
    environment:
      - TCP_ADDR=:4002
      - DHT_ADDR=:9002
      - HTTP_ADDR=:8082
      - TCP_BOOTSTRAP=seed:4000
      - DHT_BOOTSTRAP=seed:9000
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8082/stats"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s

  test:
    build: .
    depends_on:
      seed:
        condition: service_healthy
    environment:
      - TCP_ADDR=:4003
      - DHT_ADDR=:9003
      - HTTP_ADDR=:8083
      - TCP_BOOTSTRAP=seed:4000
      - DHT_BOOTSTRAP=seed:9000
      - RUN_TEST=true
